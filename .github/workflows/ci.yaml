name: CI
on:
  push:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Test
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Java and Maven
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: Build, test, and code-quality check
        run: |
          mvn --batch-mode --no-transfer-progress \
          verify checkstyle:check pmd:check
